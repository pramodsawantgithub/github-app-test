name: OpenAI PR Assistant

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  reply-on-pr-comment:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Reply to PR comment using OpenAI
        uses: actions/github-script@v9
        env:
          AI_TEST_MODE: ${{ vars.AI_TEST_MODE || 'false' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
        with:
          script: |
            const isTestMode = String(process.env.AI_TEST_MODE || '').toLowerCase() === 'true';

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.issue.number;
            const userComment = context.payload.comment.body || '';

            if (isTestMode) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: `@${context.payload.comment.user.login}\n\n[Test mode] Mock AI reply generated successfully. Disable AI_TEST_MODE to use real OpenAI responses.`
              });
              core.info('AI_TEST_MODE is enabled. Posted mock PR comment reply without calling OpenAI.');
              return;
            }

            if (!process.env.OPENAI_API_KEY) {
              core.setFailed('Missing OPENAI_API_KEY secret. Add it in repository settings.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100
            });

            const diffText = files
              .map((f) => {
                const patch = (f.patch || '').slice(0, 4000);
                return `FILE: ${f.filename}\nSTATUS: ${f.status}\nPATCH:\n${patch}`;
              })
              .join('\n\n')
              .slice(0, 120000);

            const prompt = [
              `PR title: ${pr.title}`,
              `PR body: ${pr.body || '(none)'}`,
              `Comment from @${context.payload.comment.user.login}:`,
              userComment,
              '',
              'Changed files and patch excerpts:',
              diffText
            ].join('\n');

            const response = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: process.env.OPENAI_MODEL,
                temperature: 0.2,
                messages: [
                  {
                    role: 'system',
                    content: 'You are a senior software engineer helping in GitHub pull requests. Answer the user comment clearly, with actionable guidance, and refer to relevant code changes. Keep responses concise (max 12 lines).'
                  },
                  {
                    role: 'user',
                    content: prompt
                  }
                ]
              })
            });

            if (!response.ok) {
              const errBody = await response.text();
              let errJson = null;

              try {
                errJson = JSON.parse(errBody);
              } catch (_) {
                // Keep raw body when OpenAI response is not valid JSON.
              }

              const errCode = errJson?.error?.code || '';

              if (response.status === 429 && errCode === 'insufficient_quota') {
                core.warning('OpenAI quota exceeded. Skipping AI PR comment reply. Check OpenAI billing/quota.');
                return;
              }

              core.setFailed(`OpenAI request failed (${response.status}): ${errBody}`);
              return;
            }

            const data = await response.json();
            const assistantReply = data?.choices?.[0]?.message?.content?.trim();

            if (!assistantReply) {
              core.setFailed('OpenAI returned an empty reply.');
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: `@${context.payload.comment.user.login}\n\n${assistantReply}`
            });

  ai-pr-review:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: AI code review for pull request
        uses: actions/github-script@v9
        env:
          AI_TEST_MODE: ${{ vars.AI_TEST_MODE || 'false' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
        with:
          script: |
            const isTestMode = String(process.env.AI_TEST_MODE || '').toLowerCase() === 'true';

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            if (isTestMode) {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: '## AI Review\n\n[Test mode] Mock review generated successfully.\n\n### Summary\n- Workflow trigger works.\n- PR context access works.\n\n### Risks\n- This is a test response; no real model analysis was performed.\n\n### Suggested Improvements\n- Disable `AI_TEST_MODE` to enable real OpenAI review.\n\n### Test Gaps\n- Real LLM output not validated in test mode.'
              });
              core.info('AI_TEST_MODE is enabled. Posted mock PR review without calling OpenAI.');
              return;
            }

            if (!process.env.OPENAI_API_KEY) {
              core.setFailed('Missing OPENAI_API_KEY secret. Add it in repository settings.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100
            });

            const diffText = files
              .map((f) => {
                const patch = (f.patch || '').slice(0, 5000);
                return `FILE: ${f.filename}\nSTATUS: ${f.status}\nPATCH:\n${patch}`;
              })
              .join('\n\n')
              .slice(0, 140000);

            const reviewPrompt = [
              `PR title: ${pr.title}`,
              `PR body: ${pr.body || '(none)'}`,
              '',
              'Please review this pull request and return markdown with these sections:',
              '1) Summary',
              '2) Risks',
              '3) Suggested Improvements',
              '4) Test Gaps',
              '',
              'If no major issues, say so explicitly under Risks.',
              '',
              'Changed files and patch excerpts:',
              diffText
            ].join('\n');

            const response = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: process.env.OPENAI_MODEL,
                temperature: 0.1,
                messages: [
                  {
                    role: 'system',
                    content: 'You are a strict, practical code reviewer. Focus on correctness, regressions, security, and missing tests. Be concise and specific.'
                  },
                  {
                    role: 'user',
                    content: reviewPrompt
                  }
                ]
              })
            });

            if (!response.ok) {
              const errBody = await response.text();
              let errJson = null;

              try {
                errJson = JSON.parse(errBody);
              } catch (_) {
                // Keep raw body when OpenAI response is not valid JSON.
              }

              const errCode = errJson?.error?.code || '';

              if (response.status === 429 && errCode === 'insufficient_quota') {
                core.warning('OpenAI quota exceeded. Skipping AI PR review. Check OpenAI billing/quota.');
                return;
              }

              core.setFailed(`OpenAI request failed (${response.status}): ${errBody}`);
              return;
            }

            const data = await response.json();
            const reviewBody = data?.choices?.[0]?.message?.content?.trim();

            if (!reviewBody) {
              core.setFailed('OpenAI returned an empty review.');
              return;
            }

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number: prNumber,
              event: 'COMMENT',
              body: `## AI Review\n\n${reviewBody}`
            });