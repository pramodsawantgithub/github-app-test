name: Upload Artifact

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create build directory
        run: |
          mkdir -p build
          echo "// Build artifact generated at $(date)" > build/app.js
          echo "Build artifact created successfully"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-artifact
          path: build/
          retention-days: 30

      - name: List artifacts
        run: |
          echo "Artifact uploaded successfully"
          ls -la build/
