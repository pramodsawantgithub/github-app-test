name: Upload Build To Docker

on:
  workflow_run:
    workflows:
      - Upload Artifact
    types:
      - completed

permissions:
  contents: read

jobs:
  docker-upload:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
      RUN_ID: ${{ github.event.workflow_run.id }}
      RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: docker-context/build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Create Dockerfile for artifact image
        run: |
          cat > docker-context/Dockerfile << 'EOF'
          FROM node:18-alpine
          WORKDIR /app
          COPY build/ ./build/
          CMD ["node", "build/app.js"]
          EOF

      - name: Show docker context
        run: |
          echo "::group::Docker context"
          if command -v tree >/dev/null 2>&1; then
            tree docker-context
          else
            find docker-context -maxdepth 3 -print | sort
          fi
          echo "::endgroup::"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker-context/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:build-${{ env.RUN_NUMBER }}
            ${{ env.IMAGE_NAME }}:sha-${{ env.HEAD_SHA }}
