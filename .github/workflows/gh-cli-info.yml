name: GH CLI Info

on:
  push:

permissions:
  actions: read
  contents: read
  issues: read

jobs:
  gh-info:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: GH CLI - Info Script
        run: bash ./scripts/gh-cli-info.sh
