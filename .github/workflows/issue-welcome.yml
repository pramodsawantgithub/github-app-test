name: Issue Welcome Message

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest

    steps:
      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `👋 Hi @${context.payload.issue.user.login}, thanks for your contribution! We appreciate you taking the time to open this issue. Our team will review it shortly.`
            });
