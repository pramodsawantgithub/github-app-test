name: Issue Welcome Message

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest

    steps:
      - name: Post welcome comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "👋 Hi @${{ github.event.issue.user.login }}, thanks for your contribution! We appreciate you taking the time to open this issue. Our team will review it shortly."
