name: Release Build Artifact

on:
  workflow_run:
    workflows:
      - Upload Artifact
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  release-build-artifact:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RUN_ID: ${{ github.event.workflow_run.id }}
      RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
      HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: release/build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Package release artifact
        id: package
        run: |
          echo "::group::Build tree"
          if command -v tree >/dev/null 2>&1; then
            tree release/build
          else
            find release/build -maxdepth 2 -print | sort
          fi
          echo "::endgroup::"

          short_sha="${HEAD_SHA::7}"
          artifact_name="build-artifact-${RUN_NUMBER}-${short_sha}.zip"

          cd release
          zip -r "$artifact_name" build

          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "release_tag=build-${RUN_NUMBER}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          gh release create "${{ steps.package.outputs.release_tag }}" "release/${{ steps.package.outputs.artifact_name }}" \
            --title "Build artifact ${RUN_NUMBER}" \
            --notes "Artifact from workflow run ${RUN_ID} on branch ${HEAD_BRANCH} for commit ${HEAD_SHA}."